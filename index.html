<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedido Especial ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

.card{
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
width:90%;
max-width:500px;
text-align:center;
}

h1{
color:#ff4d6d;
margin-bottom:15px;
}

.question{
font-size:22px;
margin-bottom:25px;
}

.buttons{
position:relative;
height:120px;
}

button{
border:none;
padding:15px 25px;
border-radius:50px;
font-size:18px;
cursor:pointer;
}

#yes{
background:#28a745;
color:white;
}

#no{
background:#dc3545;
color:white;
position:absolute;
left:60%;
top:0;
}

.final{
display:none;
}

.whatsapp{
display:inline-block;
margin-top:20px;
padding:15px 25px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:50px;
font-weight:bold;
}
</style>

</head>
<body>

<div class="card">

<div id="quiz">

<h1>💖 Processo Seletivo 💖</h1>

<div class="question" id="question">
Você aceita participar desta seleção extremamente importante? 😌
</div>

<div class="buttons">
<button id="yes">Sim ❤️</button>
<button id="no">Não 😅</button>
</div>

</div>

<div id="final" class="final">

<h1>🎉 Parabéns 🎉</h1>

<p>
Você foi aprovada para sair comigo ❤️
</p>

<a
class="whatsapp"
href="https://wa.me/5555996857045?text=Aceito%20o%20convite%20😂❤️"
target="_blank">
Ir para o WhatsApp
</a>

</div>

</div>

<script>

const perguntas = [
"Você aceita participar desta seleção extremamente importante? 😌",
"Você promete não rir das minhas piadas ruins? 😂",
"Você aceita receber mensagens aleatórias durante o dia? 📱",
"Você concorda que eu sou pelo menos um pouco engraçado? 😎",
"Você toparia sair comigo para tomar algo? ☕",
"Última pergunta: você aceita sair comigo? ❤️"
];

let atual = 0;

const pergunta = document.getElementById("question");
const sim = document.getElementById("yes");
const nao = document.getElementById("no");

sim.addEventListener("click", () => {

atual++;

if(atual < perguntas.length){
pergunta.innerText = perguntas[atual];
}
else{
document.getElementById("quiz").style.display="none";
document.getElementById("final").style.display="block";
}

});

function fugir(){

const largura = window.innerWidth - 120;
const altura = window.innerHeight - 80;

const x = Math.random() * largura;
const y = Math.random() * altura;

nao.style.position="fixed";
nao.style.left=x+"px";
nao.style.top=y+"px";

}

nao.addEventListener("mouseover", fugir);
nao.addEventListener("touchstart", fugir);

</script>

</body>
</html>
